# Reemplaza los entity_id si Home Assistant generó nombres distintos.
# Requiere Mushroom (HACS) para las tarjetas custom:mushroom-template-card.
type: vertical-stack
cards:
  - type: heading
    heading: Combustibles cercanos
    icon: mdi:gas-station

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.cne_combustibles_chile_gasolina_93_mas_barata
        primary: Gasolina 93
        secondary: >-
          ${{ states(entity) | int(0) }}/L · {{ state_attr(entity, 'brand') }}
          · {{ state_attr(entity, 'distance_km') }} km
        icon: mdi:gas-station
        tap_action:
          action: url
          url_path: "{{ state_attr(entity, 'google_maps_url') }}"

      - type: custom:mushroom-template-card
        entity: sensor.cne_combustibles_chile_gasolina_95_mas_barata
        primary: Gasolina 95
        secondary: >-
          ${{ states(entity) | int(0) }}/L · {{ state_attr(entity, 'brand') }}
          · {{ state_attr(entity, 'distance_km') }} km
        icon: mdi:gas-station
        tap_action:
          action: url
          url_path: "{{ state_attr(entity, 'google_maps_url') }}"

      - type: custom:mushroom-template-card
        entity: sensor.cne_combustibles_chile_gasolina_97_mas_barata
        primary: Gasolina 97
        secondary: >-
          ${{ states(entity) | int(0) }}/L · {{ state_attr(entity, 'brand') }}
          · {{ state_attr(entity, 'distance_km') }} km
        icon: mdi:gas-station
        tap_action:
          action: url
          url_path: "{{ state_attr(entity, 'google_maps_url') }}"

      - type: custom:mushroom-template-card
        entity: sensor.cne_combustibles_chile_diesel_mas_barato
        primary: Diésel
        secondary: >-
          ${{ states(entity) | int(0) }}/L · {{ state_attr(entity, 'brand') }}
          · {{ state_attr(entity, 'distance_km') }} km
        icon: mdi:fuel
        tap_action:
          action: url
          url_path: "{{ state_attr(entity, 'google_maps_url') }}"

  - type: entities
    title: Detalle
    show_header_toggle: false
    entities:
      - entity: sensor.cne_combustibles_chile_kerosene_mas_barato
        name: Kerosene más barato
      - entity: sensor.cne_combustibles_chile_estacion_mas_cercana
        name: Estación más cercana
