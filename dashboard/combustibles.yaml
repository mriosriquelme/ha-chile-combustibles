type: vertical-stack
cards:
  - type: heading
    heading: Combustibles más baratos
    icon: mdi:gas-station

  - type: markdown
    content: >
      {% set e = 'sensor.cne_combustibles_chile_gasolina_93_mas_barata' %}
      ## Gasolina 93 · ${{ states(e) }}/L

      **{{ state_attr(e, 'brand') }}** {{ state_attr(e, 'address') }}  
      📍 {{ state_attr(e, 'distance_km') }} km · {{ state_attr(e, 'service_type') }}  
      {% set ahorro = state_attr(e, 'estimated_savings_full_tank') | int(0) %}
      {% if ahorro > 0 %}💰 Ahorro estimado vs. estación más cercana: **${{ ahorro }}**{% endif %}

      [Abrir ruta en Google Maps]({{ state_attr(e, 'google_maps_url') }})

